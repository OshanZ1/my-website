<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact | My Personal Website</title>

  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <header class="page-wrap">
    <h1>My Personal Website</h1>

    <nav class="site-nav">
      <a href="index.html">Home</a> |
      <a href="about.html">About</a> |
      <a href="works.html">Works</a> |
      <a href="experience.html">Experience</a> |
      <a href="education.html">Education</a> |
      <a href="references.html">References</a> |
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <main class="page-wrap">

    <!-- Lab 6 Live Clock -->
    <section class="clock-card fade-in">
      <div class="clock-title">Current Time</div>
      <div id="liveClock" class="clock-time">00:00:00</div>
    </section>

    <!-- Lab 6 Form Console Output -->
    <section class="card fade-in">
      <h2>Contact Me</h2>

      <form id="contactForm">
        <label for="fullName">Name</label>
        <input id="fullName" type="text" required />

        <label for="email">Email</label>
        <input id="email" type="email" required />

        <label for="reason">Reason</label>
        <select id="reason" required>
          <option value="" disabled selected>Choose a reason</option>
          <option>Job Opportunity</option>
          <option>Project Collaboration</option>
          <option>General Inquiry</option>
        </select>

        <label for="message">Message</label>
        <textarea id="message" rows="5" required></textarea>

        <label class="checkbox-row">
          <input id="confirmInfo" type="checkbox" />
          I confirm the information above is correct.
        </label>

        <button type="submit">Send Message</button>
      </form>

      <p class="hint">
        (Lab 6) After clicking “Send Message”, open DevTools → Console to see the printed values.
      </p>
    </section>

  </main>

  <script src="js/app.js"></script>
</body>
</html>
